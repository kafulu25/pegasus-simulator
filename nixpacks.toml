[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm install"]

[phases.build]
cmds = ["npm run build -- --noEmit || true", "npm run build"]

[phases.build.cache]
directories = ["node_modules/.cache"]

[start]
cmd = "npx serve -s dist -l 3000"

[build.env]
NODE_ENV = "production"
CI = "true"
